<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Effort Estimation Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { min-height: 100vh; }
    body {
      background: #0C0C0F;
      color: #fff;
      font-family: 'DM Sans', 'Helvetica Neue', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
      height: 24px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 1px 6px rgba(0,0,0,0.4);
      cursor: pointer; margin-top: -2px;
    }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 1px 6px rgba(0,0,0,0.4); cursor: pointer;
    }
    input[type=range]::-webkit-slider-runnable-track { height: 2px; background: transparent; }
    input[type=range]::-moz-range-track { height: 2px; background: transparent; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel" src="app.jsx"></script>
  <div style="margin0 auto;width:80%">Designed by Keenan in Virginia. All rights reserved.</div>
</body>
</html>
